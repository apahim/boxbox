services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boxbox
      POSTGRES_USER: boxbox
      POSTGRES_PASSWORD: boxbox_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxbox -d boxbox"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "5050:5000"
    environment:
      DATABASE_URL: postgresql://boxbox:boxbox_dev@db:5432/boxbox
      SECRET_KEY: dev-secret-change-me
      FLASK_ENV: development
      MAPKIT_TOKEN: ${MAPKIT_TOKEN:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./tests:/app/tests
      - ./migrations:/app/migrations
    depends_on:
      db:
        condition: service_healthy
    command: flask run --host=0.0.0.0 --debug

volumes:
  pgdata:

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN}

  web:
    image: ghcr.io/apahim/boxbox:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://boxbox:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@db:5432/boxbox
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY}
      MAPKIT_TOKEN: ${MAPKIT_TOKEN:?Set MAPKIT_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?Set GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?Set GOOGLE_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: boxbox
      POSTGRES_USER: boxbox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boxbox -d boxbox"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  caddy_data:
  caddy_config:
